<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Master Dashboard - Jenkins & AWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #3b82f6;
            --success: #238636;
            --error: #da3633;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .dashboard {
            max-width: 1000px;
            width: 100%;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .badge {
            background: rgba(35, 134, 54, 0.15);
            color: #3fb950;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(35, 134, 54, 0.3);
        }

        h1 { font-size: 24px; font-weight: 800; }
        h1 span { color: var(--accent); }

        /* --- Stats Grid --- */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }

        /* --- Pipeline View --- */
        .panel {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 20px;
        }

        .pipeline-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: 20px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            flex: 1;
        }

        .circle {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-weight: bold;
            transition: 0.5s;
        }

        .active .circle { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .completed .circle { background: var(--success); border-color: var(--success); color: white; }

        .line {
            position: absolute;
            top: 20px;
            left: 50px;
            right: 50px;
            height: 2px;
            background: var(--border);
            z-index: 1;
        }

        /* --- Terminal / Logs --- */
        .console {
            background: #000;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            padding: 15px;
            font-size: 13px;
            color: #3fb950;
            height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        /* --- Botón --- */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }

    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <h1>Pipeline <span>DevOps</span></h1>
            <p style="color: var(--text-dim); font-size: 14px;">AWS EC2 Cluster: 54.83.80.60</p>
        </div>
        <div class="badge">● SERVICIO ACTIVO</div>
    </header>

    <div class="stats">
        <div class="stat-card">
            <p class="stat-label">Cloud Provider</p>
            <p class="stat-value">AWS (us-east-1)</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Contenedores</p>
            <p class="stat-value">Docker Hub v2.4</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Uso de CPU</p>
            <p class="stat-value" id="cpu-stat">12%</p>
        </div>
    </div>

    <div class="panel">
        <h2 style="font-size: 16px; margin-bottom: 20px;">Flujo de Despliegue Automatizado</h2>
        <div class="pipeline-steps">
            <div class="line"></div>
            <div class="step" id="step1">
                <div class="circle">1</div>
                <p class="stat-label">GitHub</p>
            </div>
            <div class="step" id="step2">
                <div class="circle">2</div>
                <p class="stat-label">Jenkins</p>
            </div>
            <div class="step" id="step3">
                <div class="circle">3</div>
                <p class="stat-label">Docker</p>
            </div>
            <div class="step" id="step4">
                <div class="circle">4</div>
                <p class="stat-label">AWS EC2</p>
            </div>
        </div>
        
        <button class="btn" onclick="startBuild()">Disparar Build (CI/CD Trigger)</button>
    </div>

    <div class="panel">
        <h2 style="font-size: 14px; color: var(--text-dim); margin-bottom: 10px;">Logs de Consola</h2>
        <div class="console" id="console">
            <p>> Sistema listo para recibir cambios...</p>
        </div>
    </div>
</div>

<script>
    function addLog(text) {
        const consoleDiv = document.getElementById('console');
        const p = document.createElement('p');
        p.innerText = `> ${text}`;
        consoleDiv.appendChild(p);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function startBuild() {
        // Limpiar estados
        for(let i=1; i<=4; i++) document.getElementById('step'+i).className = 'step';
        document.getElementById('console').innerHTML = '';

        addLog("Detectado cambio en GitHub (Main Branch)");
        document.getElementById('step1').className = 'step completed';

        setTimeout(() => {
            addLog("Jenkins CI: Iniciando Build #105...");
            document.getElementById('step2').className = 'step active';
        }, 1000);

        setTimeout(() => {
            document.getElementById('step2').className = 'step completed';
            addLog("Docker: Creando imagen y subiendo a Registry...");
            document.getElementById('step3').className = 'step active';
        }, 3000);

        setTimeout(() => {
            document.getElementById('step3').className = 'step completed';
            addLog("AWS: Desplegando contenedor en instancia EC2...");
            document.getElementById('step4').className = 'step active';
        }, 5000);

        setTimeout(() => {
            document.getElementById('step4').className = 'step completed';
            addLog("Health Check: PASSED. Despliegue exitoso.");
        }, 7000);
    }

    // Simular CPU
    setInterval(() => {
        const cpu = Math.floor(Math.random() * (25 - 5) + 5);
        document.getElementById('cpu-stat').innerText = cpu + '%';
    }, 3000);
</script>

</body>
</html>
